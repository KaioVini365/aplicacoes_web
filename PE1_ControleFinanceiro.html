<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caderno Financeiro</title>

  <!--
    ============================================================
    PLANEJAMENTO DA APLICAÇÃO – Funcionalidades futuras:
    ------------------------------------------------------------
    - Cadastrar receitas e despesas com descrição, valor e data;
    - Categorizar transações (alimentação, transporte, lazer…);
    - Exibir lista completa de transações registradas;
    - Calcular e exibir saldo atual (receitas - despesas);
    - Validar campos obrigatórios antes de salvar;
    - Excluir transações individualmente;
    - Editar transações já cadastradas;
    - Filtrar por tipo (receita/despesa) e por período;
    - Persistir dados no localStorage para não perder ao recarregar;
    - Exportar relatório em CSV ou PDF;
    - Exibir gráfico de barras com gastos por categoria.
    ============================================================
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Paleta analógica ───────────────────────────────────── */
    :root {
      --paper:        #f5f0e8;
      --paper-dark:   #ede7d9;
      --paper-line:   #d9d0be;
      --ink:          #2b2118;
      --ink-light:    #6b5a47;
      --ink-faint:    #a89880;
      --red-stamp:    #8b2020;
      --green-stamp:  #1e5c2e;
      --blue-margin:  #4a6fa5;
      --tape:         rgba(200, 180, 130, 0.45);
      --hole-color:   #c8bfb0;
    }

    body {
      background-color: #c9bfb0;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 31px,
          #b8ae9f 31px,
          #b8ae9f 32px
        );
      min-height: 100vh;
      padding: 2.5rem 1rem 5rem;
      font-family: 'Caveat', cursive;
    }

    /* ── Caderno ────────────────────────────────────────────── */
    .caderno {
      max-width: 660px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── Capa ───────────────────────────────────────────────── */
    .capa {
      background: #3d2b1f;
      border-radius: 4px 4px 0 0;
      padding: 1.5rem 2rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 6px solid #2a1c12;
    }

    .capa__titulo {
      font-family: 'Special Elite', monospace;
      font-size: 1.5rem;
      color: #e8d8b8;
      letter-spacing: 0.04em;
    }

    .capa__sub {
      font-family: 'Special Elite', monospace;
      font-size: 0.75rem;
      color: #9e8060;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .capa__espiral {
      display: flex;
      gap: 10px;
    }

    .espiral-circulo {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 3px solid #5a3e28;
      background: #2a1c12;
    }

    /* ── Folha principal ────────────────────────────────────── */
    .folha {
      background: var(--paper);
      border-left: 4px solid #d4c9b8;
      border-right: 4px solid #d4c9b8;
      padding: 0;
      position: relative;
    }

    /* Linha margem esquerda */
    .folha::before {
      content: '';
      position: absolute;
      left: 52px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--blue-margin);
      opacity: 0.35;
      pointer-events: none;
    }

    /* Furos de argola */
    .furos {
      display: flex;
      flex-direction: column;
      gap: 48px;
      position: absolute;
      left: 18px;
      top: 32px;
    }

    .furo {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--hole-color);
      border: 1px solid #b8afa0;
    }

    /* ── Seção interna ──────────────────────────────────────── */
    .secao {
      padding: 1.5rem 1.75rem 1.5rem 4rem;
      border-bottom: 1px dashed var(--paper-line);
    }

    .secao:last-child { border-bottom: none; }

    /* ── Cabeçalho da página ────────────────────────────────── */
    .pagina-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .pagina-titulo {
      font-family: 'Special Elite', monospace;
      font-size: 1.1rem;
      color: var(--ink);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-bottom: 2px solid var(--ink);
      padding-bottom: 2px;
    }

    .pagina-data {
      font-size: 0.85rem;
      color: var(--ink-light);
      font-style: italic;
    }

    /* ── Resumo (carimbo) ───────────────────────────────────── */
    .resumo {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }

    .carimbo {
      border: 2.5px solid currentColor;
      border-radius: 3px;
      padding: 0.5rem 0.875rem;
      text-align: center;
      min-width: 120px;
      flex: 1;
      transform: rotate(-0.5deg);
    }

    .carimbo:nth-child(2) { transform: rotate(0.4deg); }
    .carimbo:nth-child(3) { transform: rotate(-0.3deg); }

    .carimbo--verde { color: var(--green-stamp); }
    .carimbo--vermelho { color: var(--red-stamp); }
    .carimbo--azul { color: var(--blue-margin); }

    .carimbo__label {
      font-family: 'Special Elite', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.7;
      display: block;
      margin-bottom: 4px;
    }

    .carimbo__valor {
      font-family: 'Special Elite', monospace;
      font-size: 1.2rem;
      font-weight: 700;
      display: block;
      line-height: 1;
    }

    /* ── Formulário ─────────────────────────────────────────── */
    .form-titulo {
      font-size: 1rem;
      color: var(--ink);
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-titulo::before {
      content: '✎';
      font-size: 1.1rem;
      color: var(--ink-light);
    }

    .campo-linha {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      margin-bottom: 0.875rem;
      border-bottom: 1.5px solid var(--paper-line);
      padding-bottom: 4px;
    }

    .campo-linha label {
      font-size: 0.8rem;
      color: var(--ink-light);
      font-family: 'Special Elite', monospace;
      letter-spacing: 0.05em;
      white-space: nowrap;
      min-width: 80px;
    }

    .campo-linha input,
    .campo-linha select,
    .campo-linha textarea {
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Caveat', cursive;
      font-size: 1rem;
      color: var(--ink);
      width: 100%;
      padding: 2px 4px;
      caret-color: var(--ink);
    }

    .campo-linha select {
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    .campo-linha textarea {
      resize: none;
      height: 42px;
      line-height: 1.5;
    }

    .campo-linha input::placeholder,
    .campo-linha textarea::placeholder {
      color: var(--ink-faint);
      font-style: italic;
    }

    /* Linha dupla para campos de duas colunas */
    .campos-duplos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 1.5rem;
    }

    /* Radio tipo (receita/despesa) com cara de carimbinho */
    .tipo-grupo {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .tipo-grupo input[type="radio"] { display: none; }

    .tipo-grupo label {
      font-family: 'Special Elite', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      padding: 4px 12px;
      border: 2px solid var(--paper-line);
      border-radius: 2px;
      cursor: pointer;
      color: var(--ink-faint);
      transition: all 0.15s ease;
      min-width: auto;
      white-space: nowrap;
    }

    .tipo-grupo input[value="receita"]:checked + label {
      border-color: var(--green-stamp);
      color: var(--green-stamp);
      background: rgba(30, 92, 46, 0.06);
    }

    .tipo-grupo input[value="despesa"]:checked + label {
      border-color: var(--red-stamp);
      color: var(--red-stamp);
      background: rgba(139, 32, 32, 0.06);
    }

    /* ── Botão ──────────────────────────────────────────────── */
    .btn-registrar {
      display: block;
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.65rem;
      background: transparent;
      border: 2px solid var(--ink);
      border-radius: 2px;
      font-family: 'Special Elite', monospace;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink);
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .btn-registrar:hover {
      background: var(--ink);
      color: var(--paper);
    }

    .btn-registrar:active { opacity: 0.8; }

    /* ── Tabela de registros ────────────────────────────────── */
    .tabela-header {
      display: grid;
      grid-template-columns: 80px 1fr 80px 90px 36px;
      gap: 0 0.5rem;
      padding: 0.25rem 0 0.5rem;
      border-bottom: 2px solid var(--ink);
      margin-bottom: 0.25rem;
    }

    .tabela-header span {
      font-family: 'Special Elite', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
    }

    .tabela-header span:last-child { text-align: center; }
    .tabela-header span:nth-child(3),
    .tabela-header span:nth-child(4) { text-align: right; }

    /* Linha de registro */
    .registro {
      display: grid;
      grid-template-columns: 80px 1fr 80px 90px 36px;
      gap: 0 0.5rem;
      align-items: center;
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--paper-line);
      animation: aparece 0.2s ease;
    }

    @keyframes aparece {
      from { opacity: 0; transform: translateX(-4px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .registro__data {
      font-size: 0.8rem;
      color: var(--ink-light);
      font-style: italic;
    }

    .registro__desc {
      font-size: 0.95rem;
      color: var(--ink);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .registro__cat {
      font-size: 0.75rem;
      color: var(--ink-faint);
      text-align: right;
      font-style: italic;
    }

    .registro__valor {
      font-family: 'Special Elite', monospace;
      font-size: 0.9rem;
      font-weight: 700;
      text-align: right;
    }

    .valor--entrada { color: var(--green-stamp); }
    .valor--saida   { color: var(--red-stamp); }

    .btn-excluir {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink-faint);
      font-size: 0.9rem;
      font-family: 'Special Elite', monospace;
      padding: 2px 6px;
      border-radius: 2px;
      transition: color 0.15s, background 0.15s;
      text-align: center;
    }

    .btn-excluir:hover {
      color: var(--red-stamp);
      background: rgba(139, 32, 32, 0.08);
    }

    /* Estado vazio */
    .vazio {
      padding: 2rem 0;
      text-align: center;
      color: var(--ink-faint);
      font-style: italic;
      font-size: 0.95rem;
      border-bottom: 1px solid var(--paper-line);
    }

    /* ── Rodapé da folha ────────────────────────────────────── */
    .rodape-folha {
      background: var(--paper-dark);
      border-left: 4px solid #d4c9b8;
      border-right: 4px solid #d4c9b8;
      border-bottom: 4px solid #d4c9b8;
      border-radius: 0 0 4px 4px;
      padding: 0.5rem 1.75rem 0.75rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .rodape-folha__pag {
      font-family: 'Special Elite', monospace;
      font-size: 0.7rem;
      color: var(--ink-faint);
      letter-spacing: 0.08em;
    }

    .rodape-folha__contagem {
      font-size: 0.8rem;
      color: var(--ink-faint);
      font-style: italic;
    }

    /* ── Responsividade ─────────────────────────────────────── */
    @media (max-width: 520px) {
      .resumo { flex-direction: column; }
      .carimbo { min-width: 0; transform: none !important; }
      .campos-duplos { grid-template-columns: 1fr; }
      .tabela-header,
      .registro { grid-template-columns: 68px 1fr 80px 28px; }
      .tabela-header span:nth-child(3),
      .registro__cat { display: none; }
      .folha::before { left: 44px; }
      .furos { left: 12px; }
      .secao { padding-left: 3.25rem; }
    }

    @media (max-width: 360px) {
      .capa__titulo { font-size: 1.15rem; }
      .secao { padding-left: 2.75rem; padding-right: 1.1rem; }
    }
  </style>
</head>
<body>

<div class="caderno">

  <!-- Capa do caderno -->
  <div class="capa">
    <div>
      <div class="capa__titulo">Caderno Financeiro</div>
      <div class="capa__sub">Controle de Receitas &amp; Despesas</div>
    </div>
    <div class="capa__espiral">
      <div class="espiral-circulo"></div>
      <div class="espiral-circulo"></div>
      <div class="espiral-circulo"></div>
      <div class="espiral-circulo"></div>
      <div class="espiral-circulo"></div>
    </div>
  </div>

  <!-- Folha -->
  <div class="folha">

    <!-- Furos de argola -->
    <div class="furos" aria-hidden="true">
      <div class="furo"></div>
      <div class="furo"></div>
      <div class="furo"></div>
      <div class="furo"></div>
      <div class="furo"></div>
      <div class="furo"></div>
      <div class="furo"></div>
    </div>

    <!-- Seção 1: Resumo -->
    <div class="secao">
      <div class="pagina-header">
        <span class="pagina-titulo">Saldo Geral</span>
        <span class="pagina-data" id="data-hoje"></span>
      </div>

      <div class="resumo">
        <div class="carimbo carimbo--verde">
          <span class="carimbo__label">Entradas</span>
          <span class="carimbo__valor" id="total-entradas">R$ 0,00</span>
        </div>
        <div class="carimbo carimbo--vermelho">
          <span class="carimbo__label">Saídas</span>
          <span class="carimbo__valor" id="total-saidas">R$ 0,00</span>
        </div>
        <div class="carimbo carimbo--azul">
          <span class="carimbo__label">Saldo</span>
          <span class="carimbo__valor" id="saldo">R$ 0,00</span>
        </div>
      </div>
    </div>

    <!-- Seção 2: Formulário -->
    <div class="secao">
      <div class="pagina-header">
        <span class="pagina-titulo">Novo Lançamento</span>
      </div>

      <form id="form" novalidate>

        <!-- Tipo -->
        <div class="campo-linha" style="border-bottom: none; margin-bottom: 1rem;">
          <label>Tipo</label>
          <div class="tipo-grupo" role="group">
            <input type="radio" name="tipo" id="tipo-receita" value="receita" checked />
            <label for="tipo-receita">↑ Entrada</label>
            <input type="radio" name="tipo" id="tipo-despesa" value="despesa" />
            <label for="tipo-despesa">↓ Saída</label>
          </div>
        </div>

        <!-- Descrição -->
        <div class="campo-linha">
          <label for="descricao">Descrição</label>
          <input type="text" id="descricao" placeholder="Ex: salário, mercado, aluguel…" maxlength="60" required />
        </div>

        <!-- Valor + Data -->
        <div class="campos-duplos">
          <div class="campo-linha">
            <label for="valor">Valor R$</label>
            <input type="number" id="valor" placeholder="0,00" min="0.01" step="0.01" required />
          </div>
          <div class="campo-linha">
            <label for="data">Data</label>
            <input type="date" id="data" required />
          </div>
        </div>

        <!-- Categoria + Obs -->
        <div class="campos-duplos">
          <div class="campo-linha">
            <label for="categoria">Categoria</label>
            <select id="categoria">
              <option value="">—</option>
              <optgroup label="Entradas">
                <option>Salário</option>
                <option>Freelance</option>
                <option>Investimento</option>
                <option>Outros</option>
              </optgroup>
              <optgroup label="Saídas">
                <option>Moradia</option>
                <option>Alimentação</option>
                <option>Transporte</option>
                <option>Saúde</option>
                <option>Educação</option>
                <option>Lazer</option>
                <option>Outros</option>
              </optgroup>
            </select>
          </div>
          <div class="campo-linha">
            <label for="obs">Obs.</label>
            <input type="text" id="obs" placeholder="Anotação livre…" maxlength="60" />
          </div>
        </div>

        <button type="submit" class="btn-registrar">+ Registrar lançamento</button>
      </form>
    </div>

    <!-- Seção 3: Histórico -->
    <div class="secao">
      <div class="pagina-header">
        <span class="pagina-titulo">Histórico</span>
        <span class="pagina-data" id="contagem">0 lançamentos</span>
      </div>

      <div class="tabela-header">
        <span>Data</span>
        <span>Descrição</span>
        <span style="text-align:right">Categ.</span>
        <span style="text-align:right">Valor</span>
        <span style="text-align:center"></span>
      </div>

      <div id="lista">
        <div class="vazio" id="vazio">Nenhum lançamento ainda.</div>
      </div>
    </div>

  </div><!-- /folha -->

  <!-- Rodapé -->
  <div class="rodape-folha">
    <span class="rodape-folha__pag">pág. 01</span>
    <span class="rodape-folha__contagem">Projeto Avaliativo — v1.0</span>
  </div>

</div><!-- /caderno -->

<script>
  const transacoes = [];
  let id = 1;

  const fmtMoeda = v => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  const fmtData  = s => { const [y,m,d] = s.split('-'); return `${d}/${m}`; };

  const elEntradas  = document.getElementById('total-entradas');
  const elSaidas    = document.getElementById('total-saidas');
  const elSaldo     = document.getElementById('saldo');
  const elContagem  = document.getElementById('contagem');
  const elLista     = document.getElementById('lista');
  const elVazio     = document.getElementById('vazio');
  const elDataHoje  = document.getElementById('data-hoje');
  const dataInput   = document.getElementById('data');

  const hoje = new Date();
  dataInput.valueAsDate = hoje;
  elDataHoje.textContent = hoje.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });

  function atualizarTotais() {
    const entradas = transacoes.filter(t => t.tipo === 'receita').reduce((s,t) => s + t.valor, 0);
    const saidas   = transacoes.filter(t => t.tipo === 'despesa').reduce((s,t) => s + t.valor, 0);
    const saldo    = entradas - saidas;

    elEntradas.textContent = fmtMoeda(entradas);
    elSaidas.textContent   = fmtMoeda(saidas);
    elSaldo.textContent    = fmtMoeda(saldo);
    elSaldo.style.color    = saldo < 0 ? 'var(--red-stamp)' : 'var(--blue-margin)';

    const n = transacoes.length;
    elContagem.textContent = `${n} ${n === 1 ? 'lançamento' : 'lançamentos'}`;
  }

  function renderizar() {
    const linhas = elLista.querySelectorAll('.registro');
    linhas.forEach(l => l.remove());

    elVazio.style.display = transacoes.length === 0 ? 'block' : 'none';

    const ord = [...transacoes].sort((a,b) => b.data.localeCompare(a.data));
    ord.forEach(t => {
      const div = document.createElement('div');
      div.className = 'registro';
      div.innerHTML = `
        <span class="registro__data">${fmtData(t.data)}</span>
        <span class="registro__desc">${esc(t.descricao)}</span>
        <span class="registro__cat">${esc(t.categoria || '—')}</span>
        <span class="registro__valor ${t.tipo === 'receita' ? 'valor--entrada' : 'valor--saida'}">
          ${t.tipo === 'receita' ? '+' : '-'} ${fmtMoeda(t.valor)}
        </span>
        <button class="btn-excluir" onclick="excluir(${t.id})" aria-label="Excluir">✕</button>
      `;
      elLista.appendChild(div);
    });
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  window.excluir = function(tid) {
    const i = transacoes.findIndex(t => t.id === tid);
    if (i !== -1) { transacoes.splice(i, 1); renderizar(); atualizarTotais(); }
  };

  document.getElementById('form').addEventListener('submit', function(e) {
    e.preventDefault();
    const descricao  = document.getElementById('descricao').value.trim();
    const valor      = parseFloat(document.getElementById('valor').value);
    const data       = document.getElementById('data').value;
    const tipo       = document.querySelector('input[name="tipo"]:checked').value;
    const categoria  = document.getElementById('categoria').value;
    const obs        = document.getElementById('obs').value.trim();

    if (!descricao) { alert('Informe uma descrição.'); document.getElementById('descricao').focus(); return; }
    if (!valor || valor <= 0) { alert('Informe um valor válido.'); document.getElementById('valor').focus(); return; }
    if (!data) { alert('Selecione uma data.'); document.getElementById('data').focus(); return; }

    transacoes.push({ id: id++, descricao, valor, data, tipo, categoria, obs });
    renderizar();
    atualizarTotais();

    document.getElementById('descricao').value = '';
    document.getElementById('valor').value = '';
    document.getElementById('categoria').value = '';
    document.getElementById('obs').value = '';
    document.getElementById('descricao').focus();
  });
</script>

</body>
</html>
