<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caderno Financeiro</title>

  <!--
    ============================================================
    PLANEJAMENTO DA APLICAÇÃO – Funcionalidades futuras:
    ------------------------------------------------------------
    - Cadastrar receitas e despesas com descrição, valor e data;
    - Categorizar transações (alimentação, transporte, lazer…);
    - Exibir dinamicamente a lista de transações registradas;
    - Calcular e atualizar o saldo atual (receitas - despesas);
    - Validar campos obrigatórios antes de salvar;
    - Excluir transações individualmente da lista;
    - Editar um lançamento já cadastrado;
    - Filtrar por tipo (entrada/saída) e por período;
    - Persistir dados no localStorage para manter entre sessões;
    - Exportar relatório em CSV ou PDF.
    ============================================================
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --papel:         #f5f0e8;
      --papel-escuro:  #ede7d9;
      --linha:         #d9d0be;
      --tinta:         #2b2118;
      --tinta-leve:    #6b5a47;
      --tinta-fraca:   #a89880;
      --verde:         #1e5c2e;
      --vermelho:      #8b2020;
      --azul-margem:   #4a6fa5;
      --borda-caderno: #d4c9b8;
    }

    body {
      background-color: #c9bfb0;
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 31px,
        #b8ae9f 31px,
        #b8ae9f 32px
      );
      min-height: 100vh;
      padding: 2.5rem 1rem 5rem;
      font-family: 'Caveat', cursive;
    }

    /* ── Caderno ─────────────────────────────────────────────*/
    .caderno {
      max-width: 660px;
      margin: 0 auto;
    }

    /* ── Capa ────────────────────────────────────────────────*/
    .capa {
      background: #3d2b1f;
      border-radius: 4px 4px 0 0;
      padding: 1.5rem 2rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 6px solid #2a1c12;
    }

    .capa__titulo {
      font-family: 'Special Elite', monospace;
      font-size: 1.5rem;
      color: #e8d8b8;
      letter-spacing: 0.04em;
    }

    .capa__sub {
      font-family: 'Special Elite', monospace;
      font-size: 0.75rem;
      color: #9e8060;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .espirais {
      display: flex;
      gap: 10px;
    }

    .espiral {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 3px solid #5a3e28;
      background: #2a1c12;
    }

    /* ── Folha ───────────────────────────────────────────────*/
    .folha {
      background: var(--papel);
      border-left: 4px solid var(--borda-caderno);
      border-right: 4px solid var(--borda-caderno);
      position: relative;
    }

    .folha::before {
      content: '';
      position: absolute;
      left: 52px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--azul-margem);
      opacity: 0.35;
      pointer-events: none;
    }

    .furos {
      display: flex;
      flex-direction: column;
      gap: 48px;
      position: absolute;
      left: 18px;
      top: 32px;
    }

    .furo {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--borda-caderno);
      border: 1px solid #b8afa0;
    }

    /* ── Seções internas ─────────────────────────────────────*/
    .secao {
      padding: 1.5rem 1.75rem 1.5rem 4rem;
      border-bottom: 1px dashed var(--linha);
    }

    .secao:last-child {
      border-bottom: none;
    }

    .secao__cabecalho {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .secao__titulo {
      font-family: 'Special Elite', monospace;
      font-size: 1.05rem;
      color: var(--tinta);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-bottom: 2px solid var(--tinta);
      padding-bottom: 2px;
    }

    .secao__subtitulo {
      font-size: 0.85rem;
      color: var(--tinta-leve);
      font-style: italic;
    }

    /* ── Carimbos de resumo ──────────────────────────────────*/
    .resumo {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .carimbo {
      border: 2.5px solid currentColor;
      border-radius: 3px;
      padding: 0.5rem 0.875rem;
      text-align: center;
      flex: 1;
      min-width: 110px;
    }

    .carimbo:nth-child(1) { transform: rotate(-0.5deg); }
    .carimbo:nth-child(2) { transform: rotate(0.4deg);  }
    .carimbo:nth-child(3) { transform: rotate(-0.3deg); }

    .carimbo--verde    { color: var(--verde); }
    .carimbo--vermelho { color: var(--vermelho); }
    .carimbo--azul     { color: var(--azul-margem); }

    .carimbo__label {
      font-family: 'Special Elite', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.7;
      display: block;
      margin-bottom: 4px;
    }

    .carimbo__valor {
      font-family: 'Special Elite', monospace;
      font-size: 1.2rem;
      font-weight: 700;
      display: block;
      line-height: 1;
    }

    /* ── Formulário ──────────────────────────────────────────*/
    .form-nota {
      font-size: 0.8rem;
      color: var(--tinta-fraca);
      font-style: italic;
      margin-bottom: 1rem;
    }

    .campo-linha {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      border-bottom: 1.5px solid var(--linha);
      padding-bottom: 4px;
      margin-bottom: 0.875rem;
    }

    .campo-linha label {
      font-family: 'Special Elite', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      color: var(--tinta-leve);
      white-space: nowrap;
      min-width: 78px;
    }

    .campo-linha input,
    .campo-linha select,
    .campo-linha textarea {
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Caveat', cursive;
      font-size: 1rem;
      color: var(--tinta);
      width: 100%;
      padding: 2px 4px;
    }

    .campo-linha input::placeholder,
    .campo-linha textarea::placeholder {
      color: var(--tinta-fraca);
      font-style: italic;
    }

    .campo-linha select {
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    .campo-linha textarea {
      resize: none;
      height: 40px;
      line-height: 1.5;
    }

    .campos-duplos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 1.5rem;
    }

    /* Tipo entrada/saída */
    .tipo-grupo {
      display: flex;
      gap: 0.875rem;
      align-items: center;
    }

    .tipo-grupo input[type="radio"] {
      display: none;
    }

    .tipo-grupo label {
      font-family: 'Special Elite', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      padding: 4px 12px;
      border: 2px solid var(--linha);
      border-radius: 2px;
      cursor: pointer;
      color: var(--tinta-fraca);
      min-width: auto;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .tipo-grupo input[value="receita"]:checked + label {
      border-color: var(--verde);
      color: var(--verde);
      background: rgba(30, 92, 46, 0.06);
    }

    .tipo-grupo input[value="despesa"]:checked + label {
      border-color: var(--vermelho);
      color: var(--vermelho);
      background: rgba(139, 32, 32, 0.06);
    }

    /* ── Botões ──────────────────────────────────────────────*/
    .btn-registrar {
      display: block;
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.65rem;
      background: transparent;
      border: 2px solid var(--tinta);
      border-radius: 2px;
      font-family: 'Special Elite', monospace;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--tinta);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .btn-registrar:hover {
      background: var(--tinta);
      color: var(--papel);
    }

    .btn-registrar:active {
      opacity: 0.8;
    }

    /* ── Tabela de histórico ─────────────────────────────────*/
    .tabela-cabecalho {
      display: grid;
      grid-template-columns: 72px 1fr 90px 95px 28px;
      gap: 0 0.5rem;
      padding: 0.25rem 0 0.5rem;
      border-bottom: 2px solid var(--tinta);
      margin-bottom: 0.25rem;
    }

    .tabela-cabecalho span {
      font-family: 'Special Elite', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--tinta-leve);
    }

    .tabela-cabecalho span:nth-child(3),
    .tabela-cabecalho span:nth-child(4) {
      text-align: right;
    }

    .registro {
      display: grid;
      grid-template-columns: 72px 1fr 90px 95px 28px;
      gap: 0 0.5rem;
      align-items: center;
      padding: 0.45rem 0;
      border-bottom: 1px solid var(--linha);
    }

    .registro__data {
      font-size: 0.82rem;
      color: var(--tinta-leve);
      font-style: italic;
    }

    .registro__desc {
      font-size: 0.95rem;
      color: var(--tinta);
    }

    .registro__cat {
      font-size: 0.78rem;
      color: var(--tinta-fraca);
      text-align: right;
      font-style: italic;
    }

    .registro__valor {
      font-family: 'Special Elite', monospace;
      font-size: 0.88rem;
      font-weight: 700;
      text-align: right;
    }

    .registro__valor--entrada { color: var(--verde); }
    .registro__valor--saida   { color: var(--vermelho); }

    .btn-excluir {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Special Elite', monospace;
      font-size: 0.85rem;
      color: var(--tinta-fraca);
      padding: 2px 4px;
      border-radius: 2px;
      transition: color 0.15s, background 0.15s;
    }

    .btn-excluir:hover {
      color: var(--vermelho);
      background: rgba(139, 32, 32, 0.08);
    }

    .historico-vazio {
      padding: 2rem 0;
      text-align: center;
      color: var(--tinta-fraca);
      font-style: italic;
      font-size: 0.95rem;
    }

    /* ── Rodapé ──────────────────────────────────────────────*/
    .rodape {
      background: var(--papel-escuro);
      border: 4px solid var(--borda-caderno);
      border-top: none;
      border-radius: 0 0 4px 4px;
      padding: 0.5rem 1.75rem 0.75rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .rodape span {
      font-family: 'Special Elite', monospace;
      font-size: 0.7rem;
      color: var(--tinta-fraca);
      letter-spacing: 0.06em;
    }

    /* ── Responsividade ──────────────────────────────────────*/
    @media (max-width: 520px) {
      .resumo { flex-direction: column; }
      .carimbo { transform: none !important; }
      .campos-duplos { grid-template-columns: 1fr; }
      .tabela-cabecalho,
      .registro { grid-template-columns: 68px 1fr 80px 24px; }
      .tabela-cabecalho span:nth-child(3),
      .registro__cat { display: none; }
      .folha::before { left: 44px; }
      .furos { left: 12px; }
      .secao { padding-left: 3.25rem; }
    }

    @media (max-width: 360px) {
      .capa__titulo { font-size: 1.2rem; }
      .secao { padding-left: 2.75rem; padding-right: 1rem; }
    }
  </style>
</head>
<body>

<div class="caderno">

  <!-- Capa -->
  <div class="capa">
    <div>
      <div class="capa__titulo">Caderno Financeiro</div>
      <div class="capa__sub">Controle de Receitas &amp; Despesas</div>
    </div>
    <div class="espirais" aria-hidden="true">
      <div class="espiral"></div>
      <div class="espiral"></div>
      <div class="espiral"></div>
      <div class="espiral"></div>
      <div class="espiral"></div>
    </div>
  </div>

  <!-- Folha -->
  <div class="folha">

    <div class="furos" aria-hidden="true">
      <div class="furo"></div>
      <div class="furo"></div>
      <div class="furo"></div>
      <div class="furo"></div>
      <div class="furo"></div>
      <div class="furo"></div>
      <div class="furo"></div>
    </div>

    <!-- Seção 1: Resumo -->
    <div class="secao">
      <div class="secao__cabecalho">
        <span class="secao__titulo">Saldo Geral</span>
        <span class="secao__subtitulo">junho de 2026</span>
      </div>

      <div class="resumo">
        <div class="carimbo carimbo--verde">
          <span class="carimbo__label">Entradas</span>
          <span class="carimbo__valor" id="total-entradas">R$ 0,00</span>
        </div>
        <div class="carimbo carimbo--vermelho">
          <span class="carimbo__label">Saídas</span>
          <span class="carimbo__valor" id="total-saidas">R$ 0,00</span>
        </div>
        <div class="carimbo carimbo--azul">
          <span class="carimbo__label">Saldo</span>
          <span class="carimbo__valor" id="saldo">R$ 0,00</span>
        </div>
      </div>
    </div>

    <!-- Seção 2: Formulário -->
    <div class="secao">
      <div class="secao__cabecalho">
        <span class="secao__titulo">Novo Lançamento</span>
      </div>

      <p class="form-nota">* campos obrigatórios</p>

      <form id="form" action="#" method="post" novalidate>

        <!-- Tipo -->
        <div class="campo-linha" style="border-bottom: none; margin-bottom: 1rem;">
          <label>Tipo *</label>
          <div class="tipo-grupo" role="group" aria-label="Tipo de lançamento">
            <input type="radio" name="tipo" id="tipo-entrada" value="receita" checked />
            <label for="tipo-entrada">↑ Entrada</label>
            <input type="radio" name="tipo" id="tipo-saida" value="despesa" />
            <label for="tipo-saida">↓ Saída</label>
          </div>
        </div>

        <!-- Descrição -->
        <div class="campo-linha">
          <label for="descricao">Descrição *</label>
          <input
            type="text"
            id="descricao"
            name="descricao"
            placeholder="Ex: salário, mercado, aluguel…"
            maxlength="60"
            required
          />
        </div>

        <!-- Valor + Data -->
        <div class="campos-duplos">
          <div class="campo-linha">
            <label for="valor">Valor R$ *</label>
            <input
              type="number"
              id="valor"
              name="valor"
              placeholder="0,00"
              min="0.01"
              step="0.01"
              required
            />
          </div>
          <div class="campo-linha">
            <label for="data">Data *</label>
            <input
              type="date"
              id="data"
              name="data"
              required
            />
          </div>
        </div>

        <!-- Categoria -->
        <div class="campo-linha">
          <label for="categoria">Categoria</label>
          <select id="categoria" name="categoria">
            <option value="">—</option>
            <optgroup label="Entradas">
              <option>Salário</option>
              <option>Freelance</option>
              <option>Investimento</option>
              <option>Outros</option>
            </optgroup>
            <optgroup label="Saídas">
              <option>Moradia</option>
              <option>Alimentação</option>
              <option>Transporte</option>
              <option>Saúde</option>
              <option>Educação</option>
              <option>Lazer</option>
              <option>Outros</option>
            </optgroup>
          </select>
        </div>

        <button type="submit" class="btn-registrar">+ Registrar lançamento</button>
      </form>
    </div>

    <!-- Seção 3: Histórico -->
    <div class="secao">
      <div class="secao__cabecalho">
        <span class="secao__titulo">Histórico</span>
        <span class="secao__subtitulo" id="contagem">0 lançamentos</span>
      </div>

      <div class="tabela-cabecalho">
        <span>Data</span>
        <span>Descrição</span>
        <span style="text-align:right">Categoria</span>
        <span style="text-align:right">Valor</span>
        <span></span>
      </div>

      <!-- Registros gerados dinamicamente pelo JavaScript -->
      <div id="lista-lancamentos">
        <p class="historico-vazio" id="msg-vazio">Nenhum lançamento registrado ainda.</p>
      </div>
    </div>

  </div><!-- /folha -->

  <!-- Rodapé -->
  <div class="rodape">
    <span>pág. 01</span>
    <span>Projeto Avaliativo — v1.0</span>
  </div>

</div>

<script>
  // ============================================================
  // VARIÁVEIS GLOBAIS
  // Array que armazena todos os lançamentos cadastrados
  // e contador de ID único para cada lançamento
  // ============================================================
  let lancamentos = [];
  let proximoId = 1;

  // ============================================================
  // FUNÇÃO: formatar valor em moeda brasileira
  // Recebe um número e retorna uma string no formato R$ 0,00
  // ============================================================
  function formatarMoeda(valor) {
    return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  // ============================================================
  // FUNÇÃO: formatar data de yyyy-mm-dd para dd/mm
  // ============================================================
  function formatarData(dataStr) {
    const partes = dataStr.split('-');
    return partes[2] + '/' + partes[1];
  }

  // ============================================================
  // FUNÇÃO: atualizar os carimbos de resumo (entradas, saídas, saldo)
  // Percorre o array de lançamentos e soma os valores por tipo
  // ============================================================
  function atualizarResumo() {
    let totalEntradas = 0;
    let totalSaidas   = 0;

    // Percorre cada lançamento e soma conforme o tipo
    for (let i = 0; i < lancamentos.length; i++) {
      if (lancamentos[i].tipo === 'receita') {
        totalEntradas = totalEntradas + lancamentos[i].valor;
      } else {
        totalSaidas = totalSaidas + lancamentos[i].valor;
      }
    }

    const saldo = totalEntradas - totalSaidas;

    // Atualiza os valores nos carimbos via innerHTML
    document.getElementById('total-entradas').innerHTML = formatarMoeda(totalEntradas);
    document.getElementById('total-saidas').innerHTML   = formatarMoeda(totalSaidas);
    document.getElementById('saldo').innerHTML          = formatarMoeda(saldo);

    // Muda a cor do saldo conforme positivo ou negativo
    if (saldo < 0) {
      document.getElementById('saldo').style.color = 'var(--vermelho)';
    } else {
      document.getElementById('saldo').style.color = 'var(--azul-margem)';
    }

    // Atualiza o contador de lançamentos
    const total = lancamentos.length;
    if (total === 1) {
      document.getElementById('contagem').innerHTML = '1 lançamento';
    } else {
      document.getElementById('contagem').innerHTML = total + ' lançamentos';
    }
  }

  // ============================================================
  // FUNÇÃO: renderizar a lista de lançamentos na tabela
  // Limpa o conteúdo atual e redesenha todos os itens do array
  // ============================================================
  function renderizarLista() {
    const lista = document.getElementById('lista-lancamentos');

    // Se não há lançamentos, exibe mensagem de vazio
    if (lancamentos.length === 0) {
      lista.innerHTML = '<p class="historico-vazio" id="msg-vazio">Nenhum lançamento registrado ainda.</p>';
      return;
    }

    // Monta o HTML de cada lançamento e insere na lista
    let html = '';
    for (let i = 0; i < lancamentos.length; i++) {
      const item      = lancamentos[i];
      const classeVal = item.tipo === 'receita' ? 'registro__valor--entrada' : 'registro__valor--saida';
      const sinal     = item.tipo === 'receita' ? '+' : '−';
      const cat       = item.categoria !== '' ? item.categoria : '—';

      html += '<div class="registro" id="registro-' + item.id + '">';
      html += '  <span class="registro__data">'  + formatarData(item.data)   + '</span>';
      html += '  <span class="registro__desc">'  + item.descricao            + '</span>';
      html += '  <span class="registro__cat">'   + cat                       + '</span>';
      html += '  <span class="registro__valor '  + classeVal + '">' + sinal + ' ' + formatarMoeda(item.valor) + '</span>';
      html += '  <button class="btn-excluir" onclick="excluirLancamento(' + item.id + ')" aria-label="Excluir">✕</button>';
      html += '</div>';
    }

    lista.innerHTML = html;
  }

  // ============================================================
  // FUNÇÃO: excluir um lançamento pelo seu ID
  // Filtra o array removendo o item com o ID correspondente
  // ============================================================
  function excluirLancamento(id) {
    // Percorre o array e remove o item com o id informado
    let novaLista = [];
    for (let i = 0; i < lancamentos.length; i++) {
      if (lancamentos[i].id !== id) {
        novaLista.push(lancamentos[i]);
      }
    }

    lancamentos = novaLista;

    // Atualiza a tela após a exclusão
    renderizarLista();
    atualizarResumo();
  }

  // ============================================================
  // EVENTO: captura o envio do formulário
  // Valida os campos e, se tudo estiver certo, registra o lançamento
  // ============================================================
  document.getElementById('form').addEventListener('submit', function(evento) {
    // Impede o comportamento padrão de recarregar a página
    evento.preventDefault();

    // Captura os valores dos campos do formulário
    const descricao = document.getElementById('descricao').value;
    const valor     = document.getElementById('valor').value;
    const data      = document.getElementById('data').value;
    const tipo      = document.querySelector('input[name="tipo"]:checked').value;
    const categoria = document.getElementById('categoria').value;

    // ── Validação dos campos obrigatórios ──
    if (descricao.trim() === '') {
      alert('Por favor, informe uma descrição para o lançamento.');
      document.getElementById('descricao').focus();
      return;
    }

    if (valor === '' || Number(valor) <= 0) {
      alert('Por favor, informe um valor válido maior que zero.');
      document.getElementById('valor').focus();
      return;
    }

    if (data === '') {
      alert('Por favor, selecione uma data.');
      document.getElementById('data').focus();
      return;
    }

    // ── Cria o objeto do novo lançamento ──
    const novoLancamento = {
      id:        proximoId,
      descricao: descricao.trim(),
      valor:     Number(valor),
      data:      data,
      tipo:      tipo,
      categoria: categoria
    };

    // Adiciona ao array e incrementa o ID
    lancamentos.push(novoLancamento);
    proximoId = proximoId + 1;

    // Atualiza a tela
    renderizarLista();
    atualizarResumo();

    // Limpa os campos do formulário após o registro
    document.getElementById('descricao').value = '';
    document.getElementById('valor').value     = '';
    document.getElementById('categoria').value = '';
    document.getElementById('descricao').focus();
  });

  // ============================================================
  // INICIALIZAÇÃO: define a data de hoje no campo de data
  // ============================================================
  const hoje = new Date();
  const ano  = hoje.getFullYear();
  const mes  = String(hoje.getMonth() + 1).padStart(2, '0');
  const dia  = String(hoje.getDate()).padStart(2, '0');
  document.getElementById('data').value = ano + '-' + mes + '-' + dia;
</script>

</body>
</html>
